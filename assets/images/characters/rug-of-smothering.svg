<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Rug of Smothering">
  <defs>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0d0b09"/>
    </linearGradient>
    <linearGradient id="pile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b2a22"/>
      <stop offset="45%" stop-color="#8B3A1F"/>
      <stop offset="100%" stop-color="#4a1812"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#floor)"/>
  <!-- rolled / waiting rug -->
  <ellipse cx="200" cy="268" rx="148" ry="28" fill="#1a100c" opacity=".55"/>
  <rect x="72" y="118" width="256" height="148" rx="10" fill="url(#pile)" stroke="#d8b35f" stroke-width="3"/>
  <rect x="92" y="138" width="216" height="108" rx="6" fill="none" stroke="#c9a24a" stroke-width="2" opacity=".75"/>
  <!-- medallion -->
  <circle cx="200" cy="192" r="36" fill="#2a1210" stroke="#e0c070" stroke-width="2.5"/>
  <path d="M200 164 L208 184 L230 186 L214 200 L218 222 L200 210 L182 222 L186 200 L170 186 L192 184 Z"
        fill="#d8b35f" opacity=".9"/>
  <!-- fringe -->
  <g stroke="#a67c3a" stroke-width="2.5" stroke-linecap="round" opacity=".85">
    <line x1="88" y1="266" x2="78" y2="292"/>
    <line x1="112" y1="266" x2="104" y2="296"/>
    <line x1="136" y1="266" x2="130" y2="298"/>
    <line x1="160" y1="266" x2="156" y2="300"/>
    <line x1="184" y1="266" x2="182" y2="300"/>
    <line x1="208" y1="266" x2="210" y2="300"/>
    <line x1="232" y1="266" x2="236" y2="300"/>
    <line x1="256" y1="266" x2="262" y2="298"/>
    <line x1="280" y1="266" x2="288" y2="296"/>
    <line x1="304" y1="266" x2="314" y2="292"/>
  </g>
</svg>
